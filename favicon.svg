<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="50%" stop-color="#FF3F3F" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle with dark gradient -->
  <circle cx="256" cy="256" r="240" fill="#0D0D0E" stroke="url(#grad)" stroke-width="12" />
  
  <!-- Outer glowing dashed indicator -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#grad)" stroke-width="4" stroke-dasharray="20 12" opacity="0.8" filter="url(#glow)" />
  
  <!-- Monogram text -->
  <text x="256" y="280" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="160" 
        fill="url(#grad)" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-2"
        filter="url(#glow)">SR</text>
</svg>
